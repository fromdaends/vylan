<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden}
  body{
    font-family:system-ui,-apple-system,'Helvetica Neue','Arial Black',Arial,sans-serif;
    color:#fff; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(120% 80% at 50% 12%, rgba(38,86,220,.55) 0%, rgba(16,38,110,.30) 30%, rgba(6,14,42,0) 60%),
      radial-gradient(140% 120% at 50% 100%, rgba(20,60,200,.18) 0%, rgba(3,7,20,0) 55%),
      linear-gradient(180deg,#070d22 0%,#050a1c 45%,#02040c 100%);
    position:relative;
  }
  /* faint dot grid */
  .grid{position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 1.3px, transparent 1.3px);
    background-size:46px 46px; mask:radial-gradient(120% 90% at 50% 30%,#000 30%,transparent 80%);
    -webkit-mask:radial-gradient(120% 90% at 50% 30%,#000 30%,transparent 80%);}
  .vignette{position:absolute;inset:0;box-shadow:inset 0 0 320px 80px rgba(0,0,0,.65);pointer-events:none}
  .bigV{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);font-weight:900;
    font-size:1500px;line-height:.8;color:rgba(255,255,255,.025);user-select:none}

  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:150px 70px 120px}

  .eyebrow{display:inline-flex;align-items:center;gap:14px;
    font-size:30px;font-weight:700;letter-spacing:6px;text-transform:uppercase;
    color:#9db8ff; padding:14px 26px;border-radius:100px;
    background:rgba(80,120,255,.10);border:1px solid rgba(120,160,255,.22)}
  .eyebrow .d{width:12px;height:12px;border-radius:50%;background:#3f7bff;box-shadow:0 0 16px 3px #3f7bff}

  h1{font-weight:900;font-size:96px;line-height:1.02;letter-spacing:-3px;text-align:center;margin-top:34px}
  h1 .hl{background:linear-gradient(120deg,#5b8cff,#a9c4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{margin-top:28px;font-size:38px;font-weight:500;color:rgba(255,255,255,.62);text-align:center;letter-spacing:.2px}

  /* device card */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;margin-top:70px;perspective:2200px}
  .card{position:relative;width:980px;border-radius:26px;overflow:hidden;
    box-shadow:0 60px 140px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.08), 0 0 90px rgba(50,100,255,.18);
    transform:rotateX(7deg) rotateZ(-1.3deg);}
  .card .bar{height:56px;background:linear-gradient(180deg,#1a2236,#141a2b);display:flex;align-items:center;gap:12px;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06)}
  .card .bar i{width:15px;height:15px;border-radius:50%;display:inline-block}
  .card .bar .r{background:#ff5f57}.card .bar .y{background:#febc2e}.card .bar .g{background:#28c840}
  .card img{display:block;width:100%}
  .glow{position:absolute;width:1000px;height:560px;left:50%;top:54%;transform:translate(-50%,-50%);
    background:radial-gradient(closest-side,rgba(54,108,255,.40),transparent);filter:blur(60px);z-index:-1}

  /* phone */
  .phone{position:relative;width:430px;border-radius:54px;padding:16px;background:linear-gradient(160deg,#23304d,#0d1322);
    box-shadow:0 60px 140px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.10),0 0 90px rgba(50,100,255,.20)}
  .phone .scr{border-radius:40px;overflow:hidden;background:#fff}
  .phone .notch{position:absolute;top:30px;left:50%;transform:translateX(-50%);width:130px;height:30px;border-radius:20px;background:#05070f;z-index:2}
  .phone img{display:block;width:100%}

  /* chip callout */
  .chip{position:absolute;z-index:3;display:inline-flex;align-items:center;gap:12px;
    font-size:30px;font-weight:800;color:#fff;padding:16px 26px;border-radius:16px;
    background:linear-gradient(120deg,#1150ed,#3f7bff);box-shadow:0 18px 50px rgba(17,80,237,.55)}
  .chip .dot{width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 14px #fff}

  /* END card */
  body.end{background:#1150ed}
  .endwrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .endwrap img{width:240px;margin-bottom:70px;filter:drop-shadow(0 14px 50px rgba(0,0,0,.25))}
  .endwrap .t{font-size:104px;font-weight:900;letter-spacing:-3px;text-align:center;line-height:1.02}
  .endwrap .s{margin-top:40px;font-size:42px;font-weight:600;color:rgba(255,255,255,.85)}
  .endwrap .s .dot{opacity:.5;margin:0 16px}

  .watermark{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;opacity:.5}
  .watermark img{width:34px}.watermark span{font-size:30px;font-weight:800;letter-spacing:.5px}
</style>
</head>
<body>
<div class="grid"></div>
<div class="bigV" id="bigv">V</div>
<div id="root"></div>
<div class="vignette"></div>
<script>
const BEATS = [
 {layout:'hook', eyebrow:'For accounting firms', head:`Still chasing clients<br>for their <span class="hl">tax docs</span>?`},
 {layout:'card', img:'shot2-dashboard.png', eyebrow:'Meet Vylan', head:`Vylan <span class="hl">chases them</span><br>for you.`},
 {layout:'card', img:'shot3-engagements.png', eyebrow:'Stay on track', head:`Every client.<br>Every <span class="hl">deadline</span>.`},
 {layout:'card', img:'shot4-detail.png', eyebrow:'AI document review', head:`AI checks <span class="hl">every<br>upload</span>.`, chip:'AI · 99%'},
 {layout:'card', img:'templates.png', eyebrow:'Every return type', head:`Checklists for<br>every <span class="hl">return</span>.`},
 {layout:'card', img:'newengagement.png', eyebrow:'Two clicks', head:`Request docs<br>in <span class="hl">seconds</span>.`},
 {layout:'phone', img:'portal-crop.png', eyebrow:'The client side', head:`Clients just <span class="hl">upload</span>.<br>No logins.`},
 {layout:'card', img:'askvylan.png', eyebrow:'Built-in AI guide', head:`Ask Vylan<br><span class="hl">anything</span>.`},
 {layout:'end'},
];
function render(){
  const n = parseInt(new URLSearchParams(location.search).get('n')||'0',10);
  const b = BEATS[n]||BEATS[0];
  const root = document.getElementById('root');
  if(b.layout==='end'){
    document.body.classList.add('end');
    document.getElementById('bigv').style.display='none';
    document.querySelector('.grid').style.display='none';
    document.querySelector('.vignette').style.display='none';
    root.innerHTML = `<div class="endwrap"><img src="logo-white.png"><div class="t">Stop chasing<br>documents.</div><div class="s">Book a demo<span class="dot">·</span>vylan.app</div></div>`;
    return;
  }
  let inner = `<div class="wrap"><div class="eyebrow"><span class="d"></span>${b.eyebrow}</div><h1>${b.head}</h1>`;
  if(b.layout==='hook'){
    inner += `</div>`;
  } else if(b.layout==='phone'){
    inner += `<div class="stage"><div class="glow"></div><div class="phone"><div class="notch"></div><div class="scr"><img src="${b.img}"></div></div></div></div>`;
  } else {
    const chip = b.chip? `<div class="chip" style="right:60px;top:54%"><span class="dot"></span>${b.chip}</div>`:'';
    inner += `<div class="stage"><div class="glow"></div><div class="card"><div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i></div><img src="${b.img}">${chip}</div></div></div>`;
  }
  inner += `<div class="watermark"><img src="logo-white.png"><span>vylan</span></div>`;
  root.innerHTML = inner;
}
render();
</script>
</body>
</html>
