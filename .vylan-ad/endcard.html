<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden; }
  body {
    background:#1150ed;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    color:#fff;
    -webkit-font-smoothing:antialiased;
  }
  .logo { height:108px; margin-bottom:46px; filter: drop-shadow(0 6px 30px rgba(0,0,0,.18)); }
  .tagline {
    font-size:64px; font-weight:800; letter-spacing:-2px; line-height:1.05;
    text-align:center;
  }
  .sub {
    margin-top:26px; font-size:27px; font-weight:500; letter-spacing:.2px;
    color:rgba(255,255,255,.82);
  }
  .dot { opacity:.55; margin:0 12px; }
</style>
</head>
<body>
  <img class="logo" src="logo-white.png" alt="Vylan">
  <div class="tagline">Stop chasing documents.</div>
  <div class="sub">Book a demo<span class="dot">·</span>vylan.app</div>
</body>
</html>
