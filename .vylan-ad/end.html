<!doctype html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:system-ui,-apple-system,'Helvetica Neue','Arial Black',Arial,sans-serif;color:#fff;-webkit-font-smoothing:antialiased;background:#1150ed;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.glow{position:absolute;width:1200px;height:1200px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,255,255,.16),transparent);top:18%;filter:blur(20px)}
img.logo{width:250px;margin-bottom:78px;filter:drop-shadow(0 16px 60px rgba(0,0,0,.28));position:relative}
.t{font-size:112px;font-weight:900;letter-spacing:-4px;text-align:center;line-height:1.0;position:relative}
.s{margin-top:50px;font-size:44px;font-weight:600;color:rgba(255,255,255,.9);position:relative}
.s .dot{opacity:.55;margin:0 18px}
</style></head>
<body>
<div class="glow"></div>
<img class="logo" src="logo-white.png">
<div class="t">Stop chasing<br>documents.</div>
<div class="s">Book a demo<span class="dot">·</span>vylan.app</div>
</body></html>
