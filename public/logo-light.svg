<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="Vylan">
  <defs>
    <linearGradient id="v-right-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8bf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="v-left-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#244aa0"/>
      <stop offset="100%" stop-color="#15296b"/>
    </linearGradient>
    <clipPath id="v-left-clip-l">
      <rect x="0" y="0" width="128" height="256"/>
    </clipPath>
    <filter id="v-shadow-l" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0a1a3f" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Two-tone folded "V": full mark painted in the bright (right) blue, then the
       left half over-painted in deep navy so the two faces meet at a center fold. -->
  <g filter="url(#v-shadow-l)" fill="none" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 76 L128 178 L184 76" stroke="url(#v-right-l)"/>
    <g clip-path="url(#v-left-clip-l)">
      <path d="M72 76 L128 178 L184 76" stroke="url(#v-left-l)"/>
    </g>
  </g>
</svg>
