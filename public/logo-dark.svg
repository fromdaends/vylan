<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="Vylan">
  <defs>
    <linearGradient id="v-right-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6aa6ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="v-left-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a64d4"/>
      <stop offset="100%" stop-color="#244aa6"/>
    </linearGradient>
    <clipPath id="v-left-clip-d">
      <rect x="0" y="0" width="128" height="256"/>
    </clipPath>
    <filter id="v-shadow-d" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Same folded "V" as the light mark, brightened so it stays legible on the
       pitch-black dark-mode surfaces. -->
  <g filter="url(#v-shadow-d)" fill="none" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 76 L128 178 L184 76" stroke="url(#v-right-d)"/>
    <g clip-path="url(#v-left-clip-d)">
      <path d="M72 76 L128 178 L184 76" stroke="url(#v-left-d)"/>
    </g>
  </g>
</svg>
