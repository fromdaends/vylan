<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="Vylan">
  <defs>
    <linearGradient id="v-right-i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8bf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="v-left-i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a52ad"/>
      <stop offset="100%" stop-color="#1b3478"/>
    </linearGradient>
    <clipPath id="v-left-clip-i">
      <rect x="0" y="0" width="128" height="256"/>
    </clipPath>
  </defs>

  <!-- Tiny-size favicon: bolder strokes, no shadow, transparent background, and a
       slightly lighter left navy so the fold stays readable on dark browser tabs. -->
  <g fill="none" stroke-width="60" stroke-linecap="round" stroke-linejoin="round">
    <path d="M66 74 L128 184 L190 74" stroke="url(#v-right-i)"/>
    <g clip-path="url(#v-left-clip-i)">
      <path d="M66 74 L128 184 L190 74" stroke="url(#v-left-i)"/>
    </g>
  </g>
</svg>
